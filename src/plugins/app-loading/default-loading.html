<style data-app-loading="inject-css">
  html {
    /* same as ant-design-vue/dist/reset.css setting, avoid the title line-height changed */
    line-height: 1.15;
  }

  .loading {
    --app-loading-background: #fff;
    --app-loading-foreground: #000;

    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    color: var(--app-loading-foreground);
    background-color: var(--app-loading-background);

    /* transition: all 0.8s ease-out; */
  }

  .loading.hidden {
    pointer-events: none;
    visibility: hidden;
    opacity: 0;
    transition: all 0.8s ease-out;
  }

  .dark .loading {
    --app-loading-background: #000;
    --app-loading-foreground: #fff;
  }

  .title {
    margin-top: 64px;
    font-size: 28px;
    font-weight: 600;
    color: var(--app-loading-foreground);
  }

  .loader {
    position: relative;
    width: 2.5em;
    height: 2.5em;
    font-size: 20px;
    color: var(--app-loading-foreground);
    transform: rotate(165deg);
  }

  .loader::before,
  .loader::after {
    position: absolute;
    top: 50%;
    left: 50%;
    display: block;
    width: 0.5em;
    height: 0.5em;
    content: '';
    border-radius: 0.25em;
    transform: translate(-50%, -50%);
  }

  .loader::before {
    animation: before8 2s infinite;
  }

  .loader::after {
    animation: after6 2s infinite;
  }

  @keyframes before8 {
    0% {
      width: 0.5em;
      box-shadow: 1em -0.5em currentColor, -1em 0.5em currentColor;
    }

    35% {
      width: 2.5em;
      box-shadow: 0 -0.5em currentColor, 0 0.5em currentColor;
    }

    70% {
      width: 0.5em;
      box-shadow: -1em -0.5em currentColor, 1em 0.5em currentColor;
    }

    100% {
      box-shadow: 1em -0.5em currentColor, -1em 0.5em currentColor;
    }
  }

  @keyframes after6 {
    0% {
      height: 0.5em;
      box-shadow: 0.5em 1em currentColor, -0.5em -1em currentColor;
    }

    35% {
      height: 2.5em;
      box-shadow: 0.5em 0 currentColor, -0.5em 0 currentColor;
    }

    70% {
      height: 0.5em;
      box-shadow: 0.5em -1em currentColor, -0.5em 1em currentColor;
    }

    100% {
      box-shadow: 0.5em 1em currentColor, -0.5em -1em currentColor;
    }
  }
</style>

<div class="loading" id="__app-loading__">
  <div class="loader"></div>
  <div class="title">[app-loading-title]</div>
</div>
